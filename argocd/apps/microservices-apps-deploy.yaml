apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-apps-deploy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: eks-application-workloads
spec:
  project: default
  source:
    repoURL: https://github.com/mahesh-newdevops/microservices-apps-deploy.git
    targetRevision: main
    path: argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
