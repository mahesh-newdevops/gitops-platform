apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-manifests
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform-addons
spec:
  project: default
  source:
    repoURL: https://github.com/mahesh-newdevops/gitops-platform.git
    targetRevision: HEAD
    path: addons/karpenter/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
