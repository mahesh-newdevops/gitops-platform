apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform-addons
spec:
  project: default
  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: 1.3.1
    helm:
      releaseName: karpenter
      values: |
        settings:
          clusterName: __EKS_CLUSTER_NAME__
          interruptionQueue: __KARPENTER_INTERRUPTION_QUEUE__
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: __KARPENTER_CONTROLLER_ROLE_ARN__
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
