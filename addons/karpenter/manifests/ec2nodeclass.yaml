apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  role: __KARPENTER_NODE_ROLE_NAME__
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: __EKS_CLUSTER_NAME__
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: __EKS_CLUSTER_NAME__
  tags:
    karpenter.sh/discovery: __EKS_CLUSTER_NAME__
    managed-by: argocd

