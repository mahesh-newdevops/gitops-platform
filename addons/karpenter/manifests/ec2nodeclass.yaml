apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  role: dev-platform-eks-karpenter-node
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: dev-platform-eks
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: dev-platform-eks
  tags:
    karpenter.sh/discovery: dev-platform-eks
    managed-by: argocd
