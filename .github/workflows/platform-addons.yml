name: Platform Add-ons

on:
  workflow_dispatch:
    inputs:
      action:
        description: Apply or destroy selected add-ons
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy
      environment:
        description: Environment name
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod
      aws_region:
        description: AWS region
        required: true
        default: ap-south-1
        type: string
      cluster_name:
        description: EKS cluster name
        required: true
        default: dev-platform-eks
        type: string
      vpc_id:
        description: VPC ID for AWS Load Balancer Controller. Leave empty to read it from EKS.
        required: false
        default: ""
        type: string
      domain_filter:
        description: Route 53 domain filter for external-dns
        required: false
        default: ""
        type: string
      external_dns_role_arn:
        description: IAM role ARN for external-dns service account
        required: false
        default: ""
        type: string
      karpenter_interruption_queue:
        description: SQS interruption queue name for Karpenter
        required: false
        default: ""
        type: string
      karpenter_node_role_name:
        description: IAM role name used by Karpenter EC2 nodes
        required: false
        default: ""
        type: string
      aws_load_balancer_controller:
        description: Include AWS Load Balancer Controller
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      prometheus:
        description: Include Prometheus stack
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      loki:
        description: Include Loki stack
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      metrics_server:
        description: Include metrics-server
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      cert_manager:
        description: Include cert-manager
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      external_dns:
        description: Include external-dns
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      external_secrets:
        description: Include external-secrets
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      kyverno:
        description: Include Kyverno
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      trivy_operator:
        description: Include Trivy Operator
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      reloader:
        description: Include Reloader
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      karpenter:
        description: Include Karpenter controller
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      karpenter_manifests:
        description: Include Karpenter EC2NodeClass and NodePool
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      istio:
        description: Include optional Istio add-ons
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      microservices_apps_deploy:
        description: Include microservices application workloads
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  addons:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      EKS_CLUSTER_NAME: ${{ inputs.cluster_name }}
      VPC_ID: ${{ inputs.vpc_id }}
      DOMAIN_FILTER: ${{ inputs.domain_filter }}
      EXTERNAL_DNS_ROLE_ARN: ${{ inputs.external_dns_role_arn || secrets.EXTERNAL_DNS_ROLE_ARN }}
      KARPENTER_INTERRUPTION_QUEUE: ${{ inputs.karpenter_interruption_queue || secrets.KARPENTER_INTERRUPTION_QUEUE }}
      KARPENTER_NODE_ROLE_NAME: ${{ inputs.karpenter_node_role_name || secrets.KARPENTER_NODE_ROLE_NAME }}
      ADDON_AWS_LOAD_BALANCER_CONTROLLER: ${{ inputs.aws_load_balancer_controller }}
      ADDON_PROMETHEUS: ${{ inputs.prometheus }}
      ADDON_LOKI: ${{ inputs.loki }}
      ADDON_METRICS_SERVER: ${{ inputs.metrics_server }}
      ADDON_CERT_MANAGER: ${{ inputs.cert_manager }}
      ADDON_EXTERNAL_DNS: ${{ inputs.external_dns }}
      ADDON_EXTERNAL_SECRETS: ${{ inputs.external_secrets }}
      ADDON_KYVERNO: ${{ inputs.kyverno }}
      ADDON_TRIVY_OPERATOR: ${{ inputs.trivy_operator }}
      ADDON_RELOADER: ${{ inputs.reloader }}
      ADDON_KARPENTER: ${{ inputs.karpenter }}
      ADDON_KARPENTER_MANIFESTS: ${{ inputs.karpenter_manifests }}
      ADDON_ISTIO: ${{ inputs.istio }}
      ADDON_MICROSERVICES_APPS_DEPLOY: ${{ inputs.microservices_apps_deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORMAWS }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-platform-addons

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region "${AWS_REGION}" --name "${{ inputs.cluster_name }}"

      - name: Resolve cluster-derived values
        run: |
          set -euo pipefail
          if [ -z "${VPC_ID}" ]; then
            VPC_ID="$(aws eks describe-cluster \
              --region "${AWS_REGION}" \
              --name "${EKS_CLUSTER_NAME}" \
              --query 'cluster.resourcesVpcConfig.vpcId' \
              --output text)"
            echo "VPC_ID=${VPC_ID}" >> "${GITHUB_ENV}"
          fi
          if [ -z "${KARPENTER_INTERRUPTION_QUEUE}" ]; then
            echo "KARPENTER_INTERRUPTION_QUEUE=${EKS_CLUSTER_NAME}-karpenter-interruptions" >> "${GITHUB_ENV}"
          fi
          if [ -z "${KARPENTER_NODE_ROLE_NAME}" ]; then
            echo "KARPENTER_NODE_ROLE_NAME=${EKS_CLUSTER_NAME}-karpenter-node" >> "${GITHUB_ENV}"
          fi

      - name: Render selected add-ons
        run: |
          set -euo pipefail
          if [ "${{ inputs.action }}" = "apply" ]; then
            python3 scripts/render-addons.py --action apply --output-dir /tmp/platform-addons-rendered > /tmp/platform-addons.txt
          else
            python3 scripts/render-addons.py --action destroy > /tmp/platform-addons.txt
          fi
          cat /tmp/platform-addons.txt

      - name: Apply selected add-ons
        if: inputs.action == 'apply'
        run: |
          set -euo pipefail
          while IFS= read -r manifest; do
            kubectl apply -f "${manifest}"
          done < /tmp/platform-addons.txt

      - name: Destroy selected add-ons
        if: inputs.action == 'destroy'
        run: |
          set -euo pipefail
          while IFS= read -r manifest; do
            kubectl delete -f "${manifest}" --ignore-not-found=true
          done < /tmp/platform-addons.txt
